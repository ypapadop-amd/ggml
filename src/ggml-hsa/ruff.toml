# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as Black.
line-length = 88
indent-width = 4

# Assume Python 3.10
target-version = "py310"

[lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`) codes by default.
select = ["ALL"]
ignore = [
    "ANN001",  # no type annotation for function argument
    "ANN201",  # missing return type annotation
    "ANN202",  # missing return type annotation
    "ANN401",  # dynamic type annotation
    "ARG001",  # unused parameter
    "B023",    # variable not bound
    "C901",    # McCabe complexity
    "COM812",  # interferes with formatter
    "D203",    # 1 blank line required before class docstring
    "D213",    # multi-line docstring summary should start at the first line
    "E501",    # line too long (handled by formatter)
    "ERA001",  # commented out code
    "F403",    # name may be undefined, or defined from star imports
    "F405",    # name may be undefined, or defined from star imports
    "FBT001",  # positional boolean
    "FBT002",  # positional boolean
    "N803",    # argument name should be lowercase
    "N806",    # variable in function should be lowercase
    "PLC0415", # top-level imports
    "PLR0912", # too many branches in function
    "PLR0913", # too many arguments in function
    "PLR0915", # too many statements in function
    "PLR2004", # magic values
    "T201",    # print
    "S101",    # allow assert
    "SIM108",  # use ternary operator
    "SLF001",  # private member accessed
]
extend-select = ["I"]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.pydocstyle]
convention = "google"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"